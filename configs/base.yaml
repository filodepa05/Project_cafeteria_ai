# ═══════════════════════════════════════════════════════
#  Smart Tray – base configuration
# ═══════════════════════════════════════════════════════

# ── Data ──────────────────────────────────────────────
data:
  root: "data/processed"
  image_size: 224
  train_split: 0.8
  num_workers: 0
  pin_memory: true

# ── Model ─────────────────────────────────────────────
model:
  backbone: "resnet18"
  pretrained: true
  num_classes: 43
  portion_hidden: 256

# ── Training ──────────────────────────────────────────
training:
  epochs: 30
  batch_size: 16
  lr: 0.001
  weight_decay: 0.0001
  scheduler: "cosine"
  step_size: 10
  gamma: 0.1
  detection_loss_weight: 1.0
  portion_loss_weight: 0.5

# ── Inference ─────────────────────────────────────────
inference:
  confidence_threshold: 0.30
  nms_iou_threshold: 0.50
  device: "auto"

# ── YOLO detector ─────────────────────────────────────
yolo:
  weights_path: "src/weights/yolo_best.pt"

# ── Checkpointing ─────────────────────────────────────
checkpoint:
  save_dir: "checkpoints"
  save_every: 5
  keep_top_k: 3

# ── Logging ───────────────────────────────────────────
logging:
  log_dir: "logs"
  log_every_n_steps: 20
  use_rich: true

# ── Nutrition API ─────────────────────────────────────
nutrition:
  usda_api_key: null  # Set via USDA_API_KEY environment variable
  cache_path: "data/nutrition_cache.json"
  use_api: true  # Set to false to always use hardcoded values

# ── Debug ─────────────────────────────────────────────
_debug:
  use_synthetic: false
  synthetic_samples: 64