# ═══════════════════════════════════════════════════════
#  Smart Tray – base configuration
# ═══════════════════════════════════════════════════════

# ── Data ──────────────────────────────────────────────
data:
  root: "data"
  image_size: 640            # resize to square
  train_split: 0.8
  num_workers: 4
  pin_memory: true

# ── Model ─────────────────────────────────────────────
model:
  backbone: "resnet50"       # resnet18 | resnet50 | mobilenet_v3_small
  pretrained: true
  num_classes: 10            # food categories
  portion_hidden: 256        # portion head hidden dim

# ── Training ──────────────────────────────────────────
training:
  epochs: 30
  batch_size: 16
  lr: 0.001
  weight_decay: 0.0001
  scheduler: "cosine"        # cosine | step | none
  step_size: 10              # only for step scheduler
  gamma: 0.1                 # only for step scheduler
  detection_loss_weight: 1.0
  portion_loss_weight: 0.5

# ── Inference ─────────────────────────────────────────
inference:
  confidence_threshold: 0.30
  nms_iou_threshold: 0.50
  device: "auto"             # auto | cpu | cuda | mps

# ── Checkpointing ────────────────────────────────────
checkpoint:
  save_dir: "checkpoints"
  save_every: 5              # save every N epochs
  keep_top_k: 3              # keep best K by val loss

# ── Logging ───────────────────────────────────────────
logging:
  log_dir: "logs"
  log_every_n_steps: 20
  use_rich: true